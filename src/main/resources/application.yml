server:
  port: 8080
  error:
    include-message: always # Helps with debugging REST errors

spring:
  application:
    name: headless-auth-api
  datasource:
    url: jdbc:mysql://localhost:3306/headless_auth_db?createDatabaseIfNotExist=true
    username: root
    password: # Change this to your local MySQL root password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Mail Configuration
  mail:
    host: smtp.gmail.com # Or your preferred SMTP provider
    port: 587
    username: ${SPRING_MAIL_USERNAME:your-email@gmail.com}
    password: ${SPRING_MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Our Custom Domain Properties
api:
  security:
    jwt:
      secret-key: ${JWT_SECRET:a-very-long-fallback-secret-key-change-in-prod}
      expiration: 86400000 # 24 hours
    otp:
      expiration-minutes: 8
      subject: "Your Authentication Code"
      from-email: "noreply@yourdomain.com"
